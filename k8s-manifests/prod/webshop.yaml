apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshop-deployment
  annotations:
    # This annotation-based approach is deprecated in k8s 1.34.x
    container.apparmor.security.beta.kubernetes.io/hello: localhost/runtime-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webshop
  template:
    metadata:
      labels:
        app: webshop
    spec:
      containers:
        - name: webshop
          image: dsoadmin/caepe-webshop-demo:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webshop-service
spec:
  selector:
    app: webshop
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webshop-ingress
spec:
  ingressClassName: nginx
  rules:
    - host:
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webshop-service
                port:
                  number: 80
