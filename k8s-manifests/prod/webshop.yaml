apiVersion: v1
kind: Namespace
metadata:
  name: webshop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshop-frontend
  namespace: webshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webshop-frontend
  template:
    metadata:
      labels:
        app: webshop-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 15m
            memory: 100Mi
          limits:
            cpu: 46m
            memory: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webshop-frontend-service
  namespace: webshop
spec:
  selector:
    app: webshop-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshop-backend
  namespace: webshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webshop-backend
  template:
    metadata:
      labels:
        app: webshop-backend
    spec:
      containers:
      - name: backend
        image: node:14
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 15m
            memory: 100Mi
          limits:
            cpu: 46m
            memory: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webshop-backend-service
  namespace: webshop
spec:
  selector:
    app: webshop-backend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
