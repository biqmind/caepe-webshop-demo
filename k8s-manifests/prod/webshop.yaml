apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshop-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webshop
  template:
    metadata:
      labels:
        app: webshop
    spec:
      containers:
        - name: webshop
          image: hello:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webshop-service
spec:
  selector:
    app: webshop
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webshop-ingress
spec:
  ingressClassName: nginx
  rules:
    - host:
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webshop-service
                port:
                  number: 80
---
# --- FLOW CONTROL (v1beta3 - Deprecated in 1.32, Removed in 1.34) ---
apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: PriorityLevelConfiguration
metadata:
  name: webshop-priority-beta
spec:
  type: Limited
  limited:
    # In v1beta3, concurrency was handled via fixed 'assuredConcurrencyShares'
    assuredConcurrencyShares: 50
    limitResponse:
      type: Queue
      queuing:
        queues: 64
        handshakingFilterShares: 10
        queueLengthLimit: 128
---
apiVersion: flowcontrol.apiserver.k8s.io/v1beta3
kind: FlowSchema
metadata:
  name: webshop-flow-schema-beta
spec:
  priorityLevelConfiguration:
    name: webshop-priority-beta
  distinguisherMethod:
    type: ByUser
  rules:
    - resourceRules:
        - verbs: ["get", "list"]
          apiGroups: [""]
          resources: ["pods", "services"]
      subjects:
        - kind: Group
          group:
            name: "system:authenticated"
